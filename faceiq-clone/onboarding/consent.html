<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Consent for your FaceIQ Labs facial analysis.">
  <title>FaceIQ Labs — Consent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css?v=20260723u">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", stored || "light");
      var lang = localStorage.getItem("lang");
      if (lang) document.documentElement.setAttribute("lang", lang);
    })();
  </script>
</head>
<body class="auth-page" data-app-shell="onboarding">

  <header class="auth-header">
    <a href="/onboarding" class="auth-header__back" data-i18n="onboarding.back">Back</a>
    <div class="auth-header__actions">
      <div class="lang-switcher">
        <button type="button" class="lang-switcher__toggle" data-lang-toggle aria-expanded="false" data-i18n-aria="a11y.language">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          <span data-lang-current>EN</span>
        </button>
        <div class="lang-switcher__menu" role="menu">
          <button type="button" role="menuitem" data-lang-option="fr">Français</button>
          <button type="button" role="menuitem" data-lang-option="en">English</button>
          <button type="button" role="menuitem" data-lang-option="es">Español</button>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle data-i18n-aria="a11y.theme">
        <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
        <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <main class="auth">
    <div class="auth__card">
      <a href="/" class="auth__logo" aria-label="FaceIQ Labs">
        <img src="../assets/logo.svg" alt="">
      </a>

      <div class="shell-progress" aria-hidden="true">
        <div class="shell-progress__track">
          <div class="shell-progress__fill" data-shell-progress-fill></div>
        </div>
        <p class="shell-progress__label">
          <span data-i18n="onboarding.step">Step</span>
          <span data-onboarding-step-current>2</span>/<span data-onboarding-total>6</span>
        </p>
      </div>

      <h1 class="auth__title" data-i18n="onboarding.consent.title">Your data, your control</h1>
      <p class="auth__subtitle" data-i18n="onboarding.consent.subtitle">We need your consent to analyze your facial photos and store your results securely.</p>

      <div class="onboarding__consent-list">
        <label class="onboarding__checkbox">
          <input type="checkbox" id="consent-photos">
          <span data-i18n="onboarding.consent.photos">I agree to upload photos for AI facial analysis</span>
        </label>
        <label class="onboarding__checkbox">
          <input type="checkbox" id="consent-storage">
          <span data-i18n="onboarding.consent.storage">I agree to secure storage of my photos and analysis results</span>
        </label>
        <label class="onboarding__checkbox">
          <input type="checkbox" id="consent-disclaimer">
          <span data-i18n="onboarding.consent.disclaimer">I understand this is not medical advice</span>
        </label>
      </div>

      <button type="button" class="btn btn--full btn--lg" id="onboarding-continue" disabled data-i18n="onboarding.continue">Continue</button>
      <p class="auth__legal" data-i18n="onboarding.consent.legal">Read our Privacy Policy and Terms of Service for full details.</p>
    </div>
  </main>

  <script src="../js/config.js?v=20260723r"></script>
  <script src="/api/config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="../js/i18n.js?v=20260723r"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/onboarding.js?v=20260723r"></script>
  <script>
    (function () {
      var checks = [
        document.getElementById("consent-photos"),
        document.getElementById("consent-storage"),
        document.getElementById("consent-disclaimer")
      ];
      var continueBtn = document.getElementById("onboarding-continue");

      function allChecked() {
        return checks.every(function (c) { return c && c.checked; });
      }

      function updateButton() {
        continueBtn.disabled = !allChecked();
      }

      checks.forEach(function (check) {
        if (check) check.addEventListener("change", updateButton);
      });

      var client = window.Onboarding.initSupabase();
      if (!client) {
        window.Onboarding.redirectToLogin();
        return;
      }

      window.Onboarding.requireStep(client, 2, 2).then(function (ctx) {
        if (!ctx) return;
        continueBtn.addEventListener("click", function () {
          if (!allChecked()) return;
          window.Onboarding.saveState(ctx.user.id, { consentGiven: true });
          window.location.href = "/onboarding/front";
        });
      });
    })();
  </script>
</body>
</html>
