<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Upload your side profile photo for FaceIQ Labs analysis.">
  <title>FaceIQ Labs — Side photo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css?v=20260724b">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", stored || "light");
      var lang = localStorage.getItem("lang");
      if (lang) document.documentElement.setAttribute("lang", lang);
    })();
  </script>
</head>
<body class="auth-page onboarding-photo-page onboarding-camera-booting" data-app-shell="onboarding">

  <header class="auth-header">
    <a href="/onboarding/front" class="auth-header__back" data-i18n="onboarding.back">Back</a>
    <div class="auth-header__actions">
      <div class="lang-switcher">
        <button type="button" class="lang-switcher__toggle" data-lang-toggle aria-expanded="false" data-i18n-aria="a11y.language">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          <span data-lang-current>EN</span>
        </button>
        <div class="lang-switcher__menu" role="menu">
          <button type="button" role="menuitem" data-lang-option="fr">Français</button>
          <button type="button" role="menuitem" data-lang-option="en">English</button>
          <button type="button" role="menuitem" data-lang-option="es">Español</button>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle data-i18n-aria="a11y.theme">
        <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
        <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <main class="auth">
    <div class="auth__card auth__card--wide onboarding-photo-card">
      <a href="/" class="auth__logo" aria-label="FaceIQ Labs">
        <img src="../assets/logo.svg" alt="">
      </a>

      <div class="shell-progress" aria-hidden="true">
        <div class="shell-progress__track">
          <div class="shell-progress__fill" data-shell-progress-fill></div>
        </div>
        <p class="shell-progress__label">
          <span data-i18n="onboarding.step">Step</span>
          <span data-onboarding-step-current>4</span>/<span data-onboarding-total>6</span>
        </p>
      </div>

      <h1 class="auth__title" data-i18n="onboarding.side.title">Take a side profile photo</h1>
      <p class="auth__subtitle" data-i18n="onboarding.side.subtitle">Turn your head 90° to show your profile. Keep your chin level and look straight ahead.</p>

      <div class="onboarding__photo-zone" id="photo-zone">
        <video id="camera-video" class="onboarding__camera-video" playsinline autoplay muted></video>
        <div class="onboarding__camera-overlay onboarding__camera-overlay--side" id="camera-overlay">
          <svg viewBox="0 0 200 260" aria-hidden="true" class="onboarding__face-outline onboarding__face-outline--side">
            <path d="M130 40 C170 60, 175 120, 160 180 C150 220, 120 240, 90 230 C60 220, 50 180, 55 130 C60 80, 90 35, 130 40 Z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="8 6"/>
          </svg>
          <p class="onboarding__camera-guide" id="camera-guide" data-i18n="onboarding.side.guide">Show your full profile</p>
        </div>
        <img id="photo-preview" class="onboarding__photo-preview" alt="" hidden>
      </div>

      <div class="onboarding__scan-hud" id="camera-hud" hidden>
        <span class="onboarding__scan-hud-icon" id="camera-hud-icon" data-hint="searching" aria-hidden="true"></span>
        <p class="onboarding__scan-hud-text" id="camera-status" data-camera-status="default">Starting camera…</p>
      </div>

      <ul class="onboarding__tips">
        <li data-i18n="onboarding.side.tip1">Turn exactly 90° from the camera</li>
        <li data-i18n="onboarding.side.tip2">Keep your jawline visible</li>
        <li data-i18n="onboarding.side.tip3">Same lighting as your front photo</li>
      </ul>

      <input type="file" id="photo-input" accept="image/*" hidden>
      <div class="onboarding__photo-actions onboarding__photo-actions--scan" id="photo-actions">
        <button type="button" class="onboarding__scan-shutter" id="photo-capture" aria-label="Capture photo">
          <span class="onboarding__scan-shutter-core" aria-hidden="true"></span>
        </button>
        <button type="button" class="onboarding__scan-chip" id="photo-gallery" data-i18n="onboarding.useGallery">Gallery</button>
        <button type="button" class="onboarding__scan-chip" id="photo-retake" hidden data-i18n="onboarding.retake">Retake</button>
      </div>

      <button type="button" class="btn btn--full btn--lg" id="onboarding-continue" disabled data-i18n="onboarding.continue">Continue</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js"></script>
  <script src="../js/config.js?v=20260723r"></script>
  <script src="/api/config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="../js/i18n.js?v=20260724b"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/image-compress.js?v=20260723v"></script>
  <script src="../js/camera-prep.js?v=20260724b"></script>
  <script src="../js/camera-capture.js?v=20260724b"></script>
  <script src="../js/photo-step.js?v=20260724b"></script>
  <script src="../js/onboarding.js?v=20260724b"></script>
  <script>
    window.PhotoStep.init({
      mode: "side",
      photoKey: "sidePhoto",
      requirePhotoKey: "frontPhoto",
      requirePhotoRedirect: "/onboarding/front",
      minStep: 4,
      currentStep: 4,
      nextUrl: "/onboarding/analyzing"
    });
  </script>
</body>
</html>
