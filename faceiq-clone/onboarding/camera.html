<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Allow camera access for your FaceIQ Labs face scan.">
  <title>FaceIQ Labs — Camera access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css?v=20260724b">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", stored || "light");
      var lang = localStorage.getItem("lang");
      if (lang) document.documentElement.setAttribute("lang", lang);
    })();
  </script>
</head>
<body class="auth-page" data-app-shell="onboarding">

  <header class="auth-header">
    <a href="/onboarding" class="auth-header__back" data-i18n="onboarding.back">Back</a>
    <div class="auth-header__actions">
      <div class="lang-switcher">
        <button type="button" class="lang-switcher__toggle" data-lang-toggle aria-expanded="false" data-i18n-aria="a11y.language">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          <span data-lang-current>EN</span>
        </button>
        <div class="lang-switcher__menu" role="menu">
          <button type="button" role="menuitem" data-lang-option="fr">Français</button>
          <button type="button" role="menuitem" data-lang-option="en">English</button>
          <button type="button" role="menuitem" data-lang-option="es">Español</button>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle data-i18n-aria="a11y.theme">
        <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
        <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <main class="auth">
    <div class="auth__card">
      <a href="/" class="auth__logo" aria-label="FaceIQ Labs">
        <img src="../assets/logo.svg" alt="">
      </a>

      <div class="shell-progress" aria-hidden="true">
        <div class="shell-progress__track">
          <div class="shell-progress__fill" data-shell-progress-fill></div>
        </div>
        <p class="shell-progress__label">
          <span data-i18n="onboarding.step">Step</span>
          <span data-onboarding-step-current>2</span>/<span data-onboarding-total>6</span>
        </p>
      </div>

      <div class="onboarding__camera-access-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="10" y="18" width="44" height="32" rx="6"/>
          <circle cx="32" cy="34" r="10"/>
          <path d="M24 18l4-6h8l4 6"/>
        </svg>
      </div>

      <h1 class="auth__title" data-i18n="onboarding.cameraAccess.title">Enable your camera</h1>
      <p class="auth__subtitle" data-i18n="onboarding.cameraAccess.subtitle">We only scan your face — not your body or background. Your photos stay private on your device until analysis.</p>

      <ul class="onboarding__tips">
        <li data-i18n="onboarding.cameraAccess.tip1">Hold the phone at eye level</li>
        <li data-i18n="onboarding.cameraAccess.tip2">Move close enough so your head fills the oval</li>
        <li data-i18n="onboarding.cameraAccess.tip3">Use good, even lighting</li>
      </ul>

      <p class="auth__error" id="camera-access-error" hidden></p>

      <button type="button" class="btn btn--full btn--lg" id="camera-access-grant" data-i18n="onboarding.cameraAccess.grant">Allow camera access</button>
      <button type="button" class="btn btn--full btn--ghost" id="camera-access-skip" data-i18n="onboarding.cameraAccess.skip">Use gallery instead</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js"></script>
  <script src="../js/config.js?v=20260723r"></script>
  <script src="/api/config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="../js/i18n.js?v=20260724b"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/camera-prep.js?v=20260724b"></script>
  <script src="../js/onboarding.js?v=20260723a"></script>
  <script>
    (function () {
      var grantBtn = document.getElementById("camera-access-grant");
      var skipBtn = document.getElementById("camera-access-skip");
      var errorEl = document.getElementById("camera-access-error");
      var userId = null;
      var busy = false;

      function showError(message) {
        if (!errorEl) return;
        errorEl.textContent = message;
        errorEl.hidden = !message;
      }

      function setBusy(state) {
        busy = state;
        grantBtn.disabled = state;
        skipBtn.disabled = state;
      }

      var client = window.Onboarding.initSupabase();
      if (!client) {
        window.Onboarding.redirectToLogin();
        return;
      }

      window.Onboarding.requireStep(client, 2, 2).then(function (ctx) {
        if (!ctx) return;
        userId = ctx.user.id;
        var state = window.Onboarding.getState(userId);
        if (state.cameraReady) {
          window.location.href = "/onboarding/front";
          return;
        }

        grantBtn.addEventListener("click", function () {
          if (busy) return;
          showError("");
          setBusy(true);
          window.CameraPrep.requestAccess().then(function () {
            window.Onboarding.saveState(userId, { cameraReady: true, cameraSkipped: false });
            window.location.href = "/onboarding/front";
          }).catch(function () {
            var lang = localStorage.getItem("lang") || "en";
            var dict = (window.I18N_T && window.I18N_T[lang]) || window.I18N_T.en;
            var denied = dict && dict.onboarding && dict.onboarding.cameraAccess
              ? dict.onboarding.cameraAccess.denied
              : "Camera access was denied. You can still use the gallery.";
            showError(denied);
            setBusy(false);
          });
        });

        skipBtn.addEventListener("click", function () {
          if (busy) return;
          window.Onboarding.saveState(userId, { cameraSkipped: true, cameraReady: false });
          window.location.href = "/onboarding/front";
        });
      });
    })();
  </script>
</body>
</html>
