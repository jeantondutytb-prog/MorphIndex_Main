<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your MorphIndex analysis results.">
  <title>MorphIndex — Your results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css?v=20260727a">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", stored || "dark");
      var lang = localStorage.getItem("lang");
      if (lang) document.documentElement.setAttribute("lang", lang);
    })();
  </script>
</head>
<body class="auth-page results-page" data-app-shell="onboarding">

  <header class="auth-header">
    <span class="auth-header__spacer" aria-hidden="true"></span>
    <div class="auth-header__actions">
      <div class="lang-switcher">
        <button type="button" class="lang-switcher__toggle" data-lang-toggle aria-expanded="false" data-i18n-aria="a11y.language">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          <span data-lang-current>EN</span>
        </button>
        <div class="lang-switcher__menu" role="menu">
          <button type="button" role="menuitem" data-lang-option="fr">Français</button>
          <button type="button" role="menuitem" data-lang-option="en">English</button>
          <button type="button" role="menuitem" data-lang-option="es">Español</button>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle data-i18n-aria="a11y.theme">
        <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
        <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <main class="auth auth--results">
    <div class="auth__card auth__card--wide auth__card--results">
      <div class="shell-progress shell-progress--compact" aria-hidden="true">
        <div class="shell-progress__track">
          <div class="shell-progress__fill" data-shell-progress-fill style="width: 100%"></div>
        </div>
        <p class="shell-progress__label">
          <span data-i18n="onboarding.step">Step</span>
          <span data-onboarding-step-current>3</span>/<span data-onboarding-total>3</span>
        </p>
      </div>

      <h1 class="auth__title auth__title--compact" data-i18n="onboarding.results.title">Your results are ready</h1>
      <p class="auth__subtitle auth__subtitle--compact" data-i18n="onboarding.results.subtitle">Here's a preview — subscribe to unlock the full breakdown and your plan.</p>

      <div id="results-dashboard"></div>

      <div class="paywall paywall--inline paywall--compact" id="paywall" hidden>
        <div class="paywall__panel paywall__panel--flat" role="region" aria-labelledby="paywall-title">
          <h2 class="paywall__compact-title" id="paywall-title" data-i18n="onboarding.paywall.title">Unlock your full analysis</h2>

          <div class="paywall__plans paywall__plans--compact">
            <label class="paywall__plan paywall__plan--selected">
              <input type="radio" name="plan" value="yearly" checked>
              <span class="paywall__plan-info">
                <strong data-i18n="onboarding.paywall.yearly">Yearly</strong>
                <span data-i18n="onboarding.paywall.yearlyPrice">€59.99/year</span>
              </span>
              <span class="paywall__plan-badge" data-i18n="onboarding.paywall.bestValue">Best value</span>
            </label>
            <label class="paywall__plan">
              <input type="radio" name="plan" value="monthly">
              <span class="paywall__plan-info">
                <strong data-i18n="onboarding.paywall.monthly">Monthly</strong>
                <span data-i18n="onboarding.paywall.monthlyPrice">€9.99/month</span>
              </span>
            </label>
          </div>

          <button type="button" class="btn btn--full" id="paywall-subscribe" data-i18n="onboarding.paywall.subscribe">Subscribe now</button>
          <p class="paywall__error" id="paywall-error" hidden role="alert"></p>
          <p class="auth__legal auth__legal--compact" data-i18n="onboarding.paywall.legal">Cancel anytime. Secure payment via Stripe.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/config.js?v=20260724e"></script>
  <script src="/api/config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="../js/i18n.js?v=20260726e"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/analysis-data.js?v=20260724e"></script>
  <script src="../js/dashboard.js?v=20260725u"></script>
  <script src="../js/image-compress.js?v=20260724e"></script>
  <script src="../js/ai-api.js?v=20260724e"></script>
    <script src="../js/billing-api.js?v=20260726e"></script>
  <script src="../js/onboarding.js?v=20260725s"></script>
  <script src="../js/scan-api.js?v=20260725a"></script>
  <script>
    (function () {
      var paywall = document.getElementById("paywall");
      var subscribeBtn = document.getElementById("paywall-subscribe");
      var paywallError = document.getElementById("paywall-error");
      var dashboardEl = document.getElementById("results-dashboard");
      var subtitleEl = document.querySelector(".auth__subtitle");

      function renderResultsPreview(locked, state) {
        window.Dashboard.renderResultsPreview(dashboardEl, currentAnalysis, locked, {
          compact: true,
          frontPhoto: state && state.frontPhoto
        });
      }

      function openPaywall() {
        paywall.hidden = false;
      }

      function showPaywallError(message) {
        if (!paywallError) return;
        paywallError.textContent = message;
        paywallError.hidden = !message;
      }

      var currentFrontPhoto = null;
      var checkoutCtx = null;

      function markWelcomePending() {
        if (window.WelcomeTour && window.WelcomeTour.markPending) {
          window.WelcomeTour.markPending();
          return;
        }
        try {
          sessionStorage.setItem("morphindex-welcome-pending", "1");
        } catch (e) {
          // Ignore.
        }
      }

      function redirectToApp(welcome) {
        window.location.href = welcome ? "/app?welcome=1" : "/app";
      }

      function getSelectedPlan() {
        var selected = document.querySelector('.paywall__plan input[type="radio"]:checked');
        return selected && selected.value === "monthly" ? "monthly" : "yearly";
      }

      function startPreviewGeneration(client, ctx, state) {
        window.Onboarding.saveState(ctx.user.id, { previewGenerating: true });

        var previewPromise = window.AiApi
          ? window.AiApi.generatePreview(ctx.session, state.frontPhoto, currentAnalysis.plan)
          : Promise.resolve({ ok: false });

        return previewPromise.then(function (previewResult) {
          var patch = { previewGenerating: false };
          if (previewResult.ok && previewResult.previewUrl) {
            patch.preview6mUrl = previewResult.previewUrl;
            patch.preview6mAt = previewResult.generatedAt;
          }
          window.Onboarding.saveState(ctx.user.id, patch);
          if (patch.preview6mUrl && window.Onboarding.queueScanSync) {
            window.Onboarding.queueScanSync(ctx.user.id, { includePhotos: false });
          }
        }).catch(function () {
          window.Onboarding.saveState(ctx.user.id, { previewGenerating: false });
        });
      }

      function ensureSubscriptionActive(client, ctx, maxAttempts) {
        maxAttempts = maxAttempts == null ? 12 : maxAttempts;

        function hasActiveSession(session) {
          var user = session && session.user;
          return !!(user && window.Onboarding.hasActiveSubscription(user));
        }

        function poll(attempt) {
          return client.auth.refreshSession().then(function (result) {
            if (hasActiveSession(result.data.session)) {
              return true;
            }
            if (attempt >= maxAttempts) {
              return false;
            }
            return new Promise(function (resolve) {
              window.setTimeout(resolve, 1000);
            }).then(function () {
              return poll(attempt + 1);
            });
          });
        }

        if (window.BillingApi && window.BillingApi.syncSubscription) {
          return window.BillingApi.syncSubscription(ctx.session).then(function (syncResult) {
            if (syncResult.ok && syncResult.active) {
              return client.auth.refreshSession().then(function (result) {
                return hasActiveSession(result.data.session);
              });
            }
            return poll(0);
          }).catch(function () {
            return poll(0);
          });
        }

        return poll(0);
      }

      function finishSubscriptionFlow(client, ctx, state) {
        if (subtitleEl) {
          subtitleEl.textContent = t("onboarding.paywall.verifyingSubscription");
        }
        paywall.hidden = true;

        return ensureSubscriptionActive(client, ctx).then(function (active) {
          window.history.replaceState({}, "", "/onboarding/results");
          try {
            sessionStorage.removeItem("morphindex-checkout-pending");
          } catch (e) {
            // Ignore.
          }

          if (!active) {
            renderLockedResults(t("onboarding.paywall.activationError"));
            return;
          }

          markWelcomePending();
          startPreviewGeneration(client, ctx, state);
          redirectToApp(true);
        });
      }

      function waitForActiveSubscription(client, attempts) {
        attempts = attempts || 0;
        if (attempts > 20) {
          return Promise.resolve(false);
        }
        return client.auth.refreshSession().then(function (result) {
          var user = result.data.session && result.data.session.user;
          if (user && window.Onboarding.hasActiveSubscription(user)) {
            return true;
          }
          return new Promise(function (resolve) {
            window.setTimeout(function () {
              waitForActiveSubscription(client, attempts + 1).then(resolve);
            }, 1500);
          });
        });
      }

      function syncAndWaitForSubscription(client, ctx) {
        var syncPromise =
          window.BillingApi && window.BillingApi.syncSubscription
            ? window.BillingApi.syncSubscription(ctx.session)
            : Promise.resolve({ ok: false });

        return syncPromise.then(function (syncResult) {
          if (syncResult.ok && syncResult.active) {
            return true;
          }
          return waitForActiveSubscription(client).then(function (active) {
            if (active) {
              return true;
            }
            if (!window.BillingApi || !window.BillingApi.syncSubscription) {
              return false;
            }
            return window.BillingApi.syncSubscription(ctx.session).then(function (retry) {
              return !!(retry.ok && retry.active);
            });
          });
        });
      }

      function handlePaymentLinkReturn(client, ctx, state) {
        if (subtitleEl) {
          subtitleEl.textContent = t("onboarding.paywall.verifyingSubscription");
        }
        paywall.hidden = true;

        return syncAndWaitForSubscription(client, ctx).then(function (active) {
          window.history.replaceState({}, "", "/onboarding/results");
          try {
            sessionStorage.removeItem("morphindex-checkout-pending");
          } catch (e) {
            // Ignore.
          }
          if (active) {
            return finishSubscriptionFlow(client, ctx, state);
          }
          renderLockedResults(t("onboarding.paywall.checkoutError"));
        });
      }

      document.querySelectorAll(".paywall__plan").forEach(function (plan) {
        plan.addEventListener("click", function () {
          document.querySelectorAll(".paywall__plan").forEach(function (p) {
            p.classList.remove("paywall__plan--selected");
          });
          plan.classList.add("paywall__plan--selected");
          var radio = plan.querySelector('input[type="radio"]');
          if (radio) radio.checked = true;
        });
      });

      var client = window.Onboarding.initSupabase();
      if (!client) {
        window.Onboarding.redirectToLogin();
        return;
      }

      var currentAnalysis = null;
      var checkoutParams = new URLSearchParams(window.location.search);
      var checkoutStatus = checkoutParams.get("checkout");
      var checkoutSessionId = checkoutParams.get("session_id");

      function t(key) {
        var lang = document.documentElement.getAttribute("lang") || "en";
        var dict = window.I18N_T && window.I18N_T[lang];
        if (!dict) return key;
        var parts = key.split(".");
        var val = dict;
        for (var i = 0; i < parts.length; i++) {
          if (!val) return key;
          val = val[parts[i]];
        }
        return val != null ? val : key;
      }

      window.Onboarding.requireStep(client, 3, 3).then(function (ctx) {
        if (!ctx) return;

        if (window.ScanApi) {
          window.ScanApi.setSession(ctx.session);
        }

        var hydratePromise =
          window.ScanApi && window.ScanApi.hydrate
            ? window.ScanApi.hydrate(ctx.session, ctx.user.id)
            : Promise.resolve();

        return hydratePromise.catch(function () {
          return null;
        }).then(function () {
        var state = window.Onboarding.getState(ctx.user.id);

        if (!state.scanComplete && !(state.analysis || state.frontPhoto)) {
          window.location.href = "/onboarding";
          return;
        }

        currentAnalysis = window.AnalysisData.ensureAnalysis(state, ctx.user.id);
        currentFrontPhoto = state.frontPhoto || null;
        if (!state.analysis) {
          window.Onboarding.saveState(ctx.user.id, { analysis: currentAnalysis });
        }

        function renderLockedResults(message) {
          renderResultsPreview(true, state);
          if (subtitleEl && message) {
            subtitleEl.textContent = message;
          }
          openPaywall();
        }

        function handleActiveSubscription() {
          var welcome = false;
          try {
            welcome = sessionStorage.getItem("morphindex-welcome-pending") === "1";
          } catch (e) {
            // Ignore.
          }
          redirectToApp(welcome);
        }

        checkoutCtx = ctx;

        if (window.Onboarding.hasActiveSubscription(ctx.user)) {
          handleActiveSubscription();
          return;
        }

        if (checkoutStatus === "success") {
          if (subtitleEl) {
            subtitleEl.textContent = t("onboarding.paywall.verifying");
          }
          window.Dashboard.renderResultsPreview(dashboardEl, currentAnalysis, true, {
            compact: true,
            frontPhoto: state.frontPhoto
          });

          if (checkoutSessionId && window.BillingApi) {
            window.BillingApi.verifyCheckout(ctx.session, checkoutSessionId).then(function (result) {
              if (result.ok && result.active) {
                return finishSubscriptionFlow(client, ctx, state);
              }
              return syncAndWaitForSubscription(client, ctx).then(function (active) {
                if (active) {
                  return finishSubscriptionFlow(client, ctx, state);
                }
                renderLockedResults(t("onboarding.paywall.activationError"));
              });
            }).catch(function () {
              return syncAndWaitForSubscription(client, ctx).then(function (active) {
                if (active) {
                  return finishSubscriptionFlow(client, ctx, state);
                }
                renderLockedResults(t("onboarding.paywall.activationError"));
              });
            });
            return;
          }

          handlePaymentLinkReturn(client, ctx, state);
          return;
        }

        if (checkoutStatus === "cancelled") {
          window.history.replaceState({}, "", "/onboarding/results");
          try {
            sessionStorage.removeItem("morphindex-checkout-pending");
          } catch (e) {
            // Ignore.
          }
          renderLockedResults(t("onboarding.paywall.cancelled"));
          return;
        }

        try {
          if (sessionStorage.getItem("morphindex-checkout-pending") === "1") {
            handlePaymentLinkReturn(client, ctx, state);
            return;
          }
        } catch (e) {
          // Ignore.
        }

        renderLockedResults();

        subscribeBtn.addEventListener("click", function () {
          if (!window.BillingApi || !checkoutCtx) {
            showPaywallError(t("onboarding.paywall.checkoutError"));
            return;
          }

          subscribeBtn.disabled = true;
          showPaywallError("");
          if (subtitleEl) {
            subtitleEl.textContent = t("onboarding.paywall.checkoutLoading");
          }

          window.BillingApi.createCheckoutSession(checkoutCtx.session, getSelectedPlan()).then(function (result) {
            if (!result.ok || !result.url) {
              subscribeBtn.disabled = false;
              showPaywallError(result.error || t("onboarding.paywall.checkoutError"));
              if (subtitleEl) {
                subtitleEl.textContent = t("onboarding.results.subtitle");
              }
              return;
            }

            markWelcomePending();
            try {
              sessionStorage.setItem("morphindex-checkout-pending", "1");
            } catch (e) {
              // Ignore.
            }
            window.location.href = result.url;
          }).catch(function () {
            subscribeBtn.disabled = false;
            showPaywallError(t("onboarding.paywall.checkoutError"));
            if (subtitleEl) {
              subtitleEl.textContent = t("onboarding.results.subtitle");
            }
          });
        });
        });
      });
    })();
  </script>
</body>
</html>
