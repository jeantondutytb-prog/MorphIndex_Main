<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Analyzing your facial features with FaceIQ Labs.">
  <title>FaceIQ Labs — Analyzing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css?v=20260723u">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", stored || "light");
      var lang = localStorage.getItem("lang");
      if (lang) document.documentElement.setAttribute("lang", lang);
    })();
  </script>
</head>
<body class="auth-page" data-app-shell="onboarding">

  <header class="auth-header">
    <span class="auth-header__spacer" aria-hidden="true"></span>
    <div class="auth-header__actions">
      <div class="lang-switcher">
        <button type="button" class="lang-switcher__toggle" data-lang-toggle aria-expanded="false" data-i18n-aria="a11y.language">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          <span data-lang-current>EN</span>
        </button>
        <div class="lang-switcher__menu" role="menu">
          <button type="button" role="menuitem" data-lang-option="fr">Français</button>
          <button type="button" role="menuitem" data-lang-option="en">English</button>
          <button type="button" role="menuitem" data-lang-option="es">Español</button>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle data-i18n-aria="a11y.theme">
        <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
        <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <main class="auth">
    <div class="auth__card auth__card--analyzing">
      <a href="/" class="auth__logo" aria-label="FaceIQ Labs">
        <img src="../assets/logo.svg" alt="">
      </a>

      <div class="shell-progress" aria-hidden="true">
        <div class="shell-progress__track">
          <div class="shell-progress__fill" data-shell-progress-fill></div>
        </div>
        <p class="shell-progress__label">
          <span data-i18n="onboarding.step">Step</span>
          <span data-onboarding-step-current>4</span>/<span data-onboarding-total>5</span>
        </p>
      </div>

      <div class="onboarding__spinner" aria-hidden="true"></div>
      <h1 class="auth__title" data-i18n="onboarding.analyzing.title">Analyzing your face…</h1>
      <p class="auth__subtitle" data-i18n="onboarding.analyzing.subtitle">Measuring 100+ facial metrics across 4 pillars.</p>

      <ul class="onboarding__analysis-steps" id="analysis-steps">
        <li data-step="harmony" data-i18n="onboarding.analyzing.harmony">Mapping facial harmony ratios</li>
        <li data-step="angularity" data-i18n="onboarding.analyzing.angularity">Measuring jawline & bone structure</li>
        <li data-step="dimorphism" data-i18n="onboarding.analyzing.dimorphism">Evaluating dimorphic traits</li>
        <li data-step="features" data-i18n="onboarding.analyzing.features">Analyzing skin & feature quality</li>
      </ul>
    </div>
  </main>

  <script src="../js/config.js?v=20260723s"></script>
  <script src="/api/config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="../js/i18n.js?v=20260723s"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/analysis-data.js?v=20260723v"></script>
  <script src="../js/image-compress.js?v=20260723v"></script>
  <script src="../js/ai-api.js?v=20260723v"></script>
  <script src="../js/onboarding.js?v=20260723w"></script>
  <script>
    (function () {
      var steps = document.querySelectorAll("#analysis-steps li");
      var stepIndex = 0;
      var MIN_ANALYSIS_MS = 5500;

      function activateNextStep() {
        if (stepIndex > 0 && steps[stepIndex - 1]) {
          steps[stepIndex - 1].classList.add("is-done");
        }
        if (steps[stepIndex]) {
          steps[stepIndex].classList.add("is-active");
          stepIndex += 1;
        }
      }

      function finishAnalysis(ctx, state, analysis) {
        window.Onboarding.saveState(ctx.user.id, {
          scanComplete: true,
          scores: analysis.scores,
          analysis: analysis
        });

        ctx.client.auth.updateUser({
          data: { onboarding_complete: true }
        }).finally(function () {
          window.location.href = "/onboarding/results";
        });
      }

      var client = window.Onboarding.initSupabase();
      if (!client) {
        window.Onboarding.redirectToLogin();
        return;
      }

      window.Onboarding.requireStep(client, 4, 4).then(function (ctx) {
        if (!ctx) return;
        var state = window.Onboarding.getState(ctx.user.id);
        if (!state.frontPhoto || !state.sidePhoto) {
          window.location.href = state.frontPhoto ? "/onboarding/side" : "/onboarding/front";
          return;
        }

        activateNextStep();
        var interval = setInterval(activateNextStep, 1200);
        var startedAt = Date.now();

        var aiPromise = window.AiApi
          ? window.AiApi.analyzeFace(ctx.session, state.frontPhoto, state.sidePhoto)
          : Promise.resolve({ ok: false });

        aiPromise.then(function (aiResult) {
          var waitMs = Math.max(0, MIN_ANALYSIS_MS - (Date.now() - startedAt));
          setTimeout(function () {
            clearInterval(interval);
            steps.forEach(function (li) {
              li.classList.add("is-done");
              li.classList.remove("is-active");
            });

            var analysis;
            if (aiResult.ok && aiResult.analysis) {
              analysis = aiResult.analysis;
            } else {
              analysis = window.AnalysisData.generateAnalysis(ctx.user.id);
              analysis.source = "mock";
            }

            finishAnalysis(ctx, state, analysis);
          }, waitMs);
        });
      });
    })();
  </script>
</body>
</html>
