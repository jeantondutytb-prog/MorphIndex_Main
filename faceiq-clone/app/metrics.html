<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track your progress with detailed facial metrics and score history.">
  <title>FaceIQ Labs — Progress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css?v=20260724m">
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", stored || "light");
      var lang = localStorage.getItem("lang");
      if (lang) document.documentElement.setAttribute("lang", lang);
    })();
  </script>
</head>
<body class="auth-page app-page app-page--booting" data-auth-page="app" data-app-view="metrics">

  <header class="auth-header">
    <a href="/app" class="auth-header__back" data-i18n="dashboard.nav.backToApp">Back to dashboard</a>
    <div class="auth-header__actions">
      <div class="lang-switcher">
        <button type="button" class="lang-switcher__toggle" data-lang-toggle aria-expanded="false" data-i18n-aria="a11y.language">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          <span data-lang-current>EN</span>
        </button>
        <div class="lang-switcher__menu" role="menu">
          <button type="button" role="menuitem" data-lang-option="fr">Français</button>
          <button type="button" role="menuitem" data-lang-option="en">English</button>
          <button type="button" role="menuitem" data-lang-option="es">Español</button>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle data-i18n-aria="a11y.theme">
        <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
        <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <main class="auth auth--dashboard">
    <div class="auth__card auth__card--dashboard">
      <div class="dashboard-boot" aria-hidden="true">
        <div class="dashboard-boot__hero"></div>
        <div class="dashboard-boot__line"></div>
        <div class="dashboard-boot__line"></div>
      </div>

      <div class="dashboard-header">
        <a href="/app" class="auth__logo dashboard-header__logo" aria-label="FaceIQ Labs">
          <img src="../assets/logo.svg" alt="">
        </a>
        <div class="dashboard-header__intro">
          <p class="dashboard-header__eyebrow" data-i18n="dashboard.eyebrow">Your analysis</p>
          <h1 class="dashboard-header__title" id="dashboard-page-title" data-i18n="dashboard.pages.metrics.title">Progress</h1>
          <p class="auth__email dashboard-header__email" id="app-email" hidden></p>
        </div>
        <button type="button" class="btn btn--ghost btn--sm dashboard-header__signout" id="app-signout" data-i18n="app.signOut">Sign out</button>
      </div>

      <div id="dashboard-empty" hidden></div>
      <div id="dashboard-history" hidden></div>
      <div id="dashboard-metrics"></div>
      <div id="dashboard-progress-actions" hidden></div>

      <p class="dashboard-footer" data-i18n="dashboard.disclaimer">Scores are for self-improvement guidance only — not medical advice.</p>
    </div>
  </main>

  <div id="dashboard-nav"></div>

  <script src="../js/config.js?v=20260724e"></script>
  <script src="/api/config.js" onerror="void 0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="../js/i18n.js?v=20260724m"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/analysis-data.js?v=20260724e"></script>
  <script src="../js/onboarding.js?v=20260724k"></script>
  <script src="../js/dashboard.js?v=20260724m"></script>
  <script src="../js/journey-api.js?v=20260724k"></script>
  <script src="../js/app-shell.js?v=20260724m"></script>
  <script src="../js/app.js?v=20260724m"></script>
</body>
</html>
